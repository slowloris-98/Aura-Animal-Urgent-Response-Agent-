<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura - Animal Urgent Response Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        <header class="bg-emerald-600 text-white p-4 sticky top-0 z-10">
            <h1 class="text-2xl font-bold text-center">Aura Rescue</h1>
            <p class="text-sm text-center opacity-80">Urgent Animal Response Agent</p>
        </header>

        <main class="p-4 pb-24">
            <form id="reportForm" class="space-y-6">
                <!-- Camera Capture -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Capture Animal Photo</label>
                    <input type="file" id="imageInput" accept="image/*" capture="environment" 
                        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 border border-gray-300 rounded-md p-2">
                </div>

                <!-- Description -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-700">Condition Description</label>
                    <textarea id="descriptionInput" rows="3" required
                        class="w-full p-3 border border-gray-300 rounded-md focus:ring-emerald-500 focus:border-emerald-500"
                        placeholder="E.g., Found an injured stray dog, seems to have a broken leg..."></textarea>
                </div>

                <!-- Location & GPS -->
                <div class="space-y-2">
                    <button type="button" id="getLocationBtn" 
                        class="w-full bg-blue-100 text-blue-700 py-2 px-4 rounded-md font-medium hover:bg-blue-200 transition flex items-center justify-center gap-2">
                        <span>📍 Get Current Location</span>
                    </button>
                    <p id="locationStatus" class="text-xs text-gray-500 text-center mt-1"></p>
                    <input type="hidden" id="latInput">
                    <input type="hidden" id="lngInput">
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-emerald-600 text-white py-3 px-4 rounded-md font-bold text-lg shadow-md hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                    🚨 Alert Rescue Agent
                </button>
            </form>
            
            <!-- Loading/Results Area -->
            <div id="resultsArea" class="mt-8 hidden space-y-4 border-t pt-4">
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h3 class="font-bold text-lg text-gray-800 mb-2">Agent Response</h3>
                    <div id="responseText" class="text-sm text-gray-600">Waiting for AI...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
